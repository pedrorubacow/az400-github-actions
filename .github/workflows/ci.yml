name: CI Paralelo

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  test-python:
    name: Testar Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Instalar dependências
        run: pip install pytest
      - name: Rodar testes
        run: echo "Rodando testes Python..."

  test-lint:
    name: Verificar qualidade do código
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Verificar lint
        run: echo "Verificando qualidade do código..."

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [test-python, test-lint]
    steps:
      - uses: actions/checkout@v6
      - name: Simular deploy
        run: echo "Deploy realizado após todos os testes passarem!"
